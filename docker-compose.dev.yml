# Local dev database only — production Postgres lives on Coolify.
#   docker compose -f docker-compose.dev.yml up -d
# Pinned to the original compose project name: the repo dir was renamed
# (ascysws-alpha → anvil), and without this the volume resolves to an empty
# anvil_anvil-pgdata clone instead of the seeded ascysws-alpha_anvil-pgdata.
name: ascysws-alpha
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: anvil
      POSTGRES_PASSWORD: anvil
      POSTGRES_DB: anvil
    ports:
      # host 5436: 5432-5435 belong to other projects' databases on this
      # machine (beest, sidekick, lapse, theseus)
      - '5436:5432'
    volumes:
      - anvil-pgdata:/var/lib/postgresql/data

volumes:
  anvil-pgdata:
